; arduino/platformio.ini
; ======================
; PlatformIO build configuration for the BCI FYP Arduino Uno R3 peripheral.
;
; To build and upload:
;   cd arduino && pio run --target upload
;
; To open serial monitor:
;   cd arduino && pio device monitor
;
; Serial protocol (115200 baud, JSON lines):
;   Python → Arduino:
;     {"cmd":"start","task":1}                        — begin task N; ack returned
;     {"cmd":"stop"}                                  — stop, zero both motors; ack returned
;     {"cmd":"set_vibration","motor":1,"intensity":N} — set motor 1 PWM 0-255; no ack
;     {"cmd":"set_vibration","motor":2,"intensity":N} — set motor 2 PWM 0-255; no ack
;     {"cmd":"set_report_interval","ms":N}            — set encoder report interval (10-1000 ms)
;   Arduino → Python:
;     {"type":"ready"}                    — sent once on boot
;     {"type":"encoder","delta":N}        — ticks since last report (50 ms intervals)
;     {"type":"ack","cmd":"start","task":N} — start acknowledgement
;     {"type":"ack","cmd":"stop"}           — stop acknowledgement
;   Pin assignments: ENC_A=2(INT0)  ENC_B=3(INT1)  VIB1=9(PWM)  VIB2=10(PWM)

[platformio]
description = BCI FYP — Arduino Uno R3 rotary encoder + vibration motor peripheral

[env:uno]
platform      = atmelavr
board         = uno
framework     = arduino
lib_deps      = bblanchon/ArduinoJson@^6.21.3
                arduino-libraries/Servo@^1.2.1
upload_speed  = 115200
monitor_speed = 115200
